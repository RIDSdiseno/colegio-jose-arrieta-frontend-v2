[build]
  command = "npm run build"
  publish = "dist"

[[redirects]]
  from = "/biblioteca"
  to = "http://colegioarrieta.ddns.net:83/"
  status = 302
  force = true

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    # Evita que el sitio sea embebido en iframes de otros dominios
    X-Frame-Options = "SAMEORIGIN"
    # Evita que el navegador adivine el tipo de contenido
    X-Content-Type-Options = "nosniff"
    # No envía el referrer a sitios externos
    Referrer-Policy = "strict-origin-when-cross-origin"
    # Permite cámara/micrófono/geolocalización solo si es necesario
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
    # CSP: permite recursos propios + CDNs usados en el proyecto
    Content-Security-Policy = "default-src 'self'; script-src 'self' https://www.googletagmanager.com https://www.google-analytics.com https://connect.facebook.net; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: blob: https: http:; media-src 'self'; frame-src https://www.youtube.com https://www.youtube-nocookie.com https://www.google.com https://maps.google.com https://maps.googleapis.com https://www.googletagmanager.com; connect-src 'self' https://*.supabase.co https://*.railway.app https://formspree.io https://www.google-analytics.com https://www.googletagmanager.com https://region1.google-analytics.com https://www.facebook.com https://connect.facebook.net; object-src 'none'; base-uri 'self';"
